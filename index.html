<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>命運中轉站 - Oracle Station</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme">
    <div class="noise-overlay" style="pointer-events: none;"></div>

    <nav class="navbar navbar-expand-lg navbar-dark bg-transparent pt-3 px-4">
        <div class="container-fluid">
            <button id="theme-toggle" class="btn btn-outline-secondary rounded-pill btn-sm">切換明亮晨光 ☀️</button>

            <div class="d-flex align-items-center ms-auto">
                <button id="login-btn" class="btn btn-mystical btn-sm">登入解鎖運勢紀錄 🔮</button>
                <div id="user-profile" class="d-none d-flex align-items-center">
                    <span id="user-name" class="me-3 small text-muted"></span>
                    <button id="history-btn" class="btn btn-outline-info btn-sm rounded-pill me-2" data-bs-toggle="modal" data-bs-target="#historyModal">命運日曆 📜</button>
                    <button id="logout-btn" class="btn btn-outline-danger btn-sm rounded-pill">登出</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="text-center mb-5">
            <h1 class="display-4 fw-bold mystical-title">命運中轉站</h1>
            <p class="lead text-muted">宇宙的處理器正在運轉，請誠心發問</p>
        </div>

        <div class="row g-4 justify-content-center">
            <div class="col-md-5">
                <div class="mystical-card p-4 text-center h-100 shadow">
                    <h4 class="mb-3 text-accent">今日塔羅神諭</h4>
                    <p class="small text-muted mb-4">從下方牌陣中選取一張感應卡牌</p>

                    <button id="shuffle-btn" class="btn btn-sm btn-outline-secondary rounded-pill mb-4">重新洗牌 🔀</button>

                    <div id="tarot-deck-container" class="tarot-deck"></div>
                </div>
            </div>

            <div class="col-md-5">
                <div class="mystical-card p-4 text-center h-100 shadow">
                    <h4 class="mb-3 text-accent">AI 靈魂診斷</h4>
                    <p class="small text-muted mb-4">心中默念問題，讓宇宙為你解答</p>

                    <input type="text" id="user-question" class="form-control mystical-input mb-4 py-2" placeholder="例如：期中專題會過嗎？晚餐吃什麼？">

                    <button id="draw-lot-btn" class="btn btn-mystical w-100">連結宇宙運算 ✨</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="text-center mt-5 pb-4 small text-muted">
        <p>※ 本站由睡眠不足的開發者於半夜強行維護，內含 99% 玄學與 1% 的 Bug ※</p>
        <p>© 2026 Oracle Station | NKNU SEM</p>
    </footer>

    <div class="modal fade" id="resultModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content mystical-card" id="capture-area">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title text-accent" id="modal-title">宇宙連接中...</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" data-html2canvas-ignore="true"></button>
                </div>
                <div class="modal-body text-center" id="modal-body"></div>

                <div class="modal-footer border-secondary justify-content-center" data-html2canvas-ignore="true">
                    <button id="download-btn" class="btn btn-mystical btn-sm w-100">📸 沖洗今日命運 (儲存拍立得)</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="historyModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content mystical-card">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title text-accent">📜 你的命運日曆</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="history-modal-body"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <script>
        // 妳專屬的 Firebase 金鑰
        const firebaseConfig = {
            apiKey: "AIzaSyCmXEqjjpvPMvb3ms3xEKiV9bVd5bgCzUg",
            authDomain: "oracle-station-a187f.firebaseapp.com",
            projectId: "oracle-station-a187f",
            storageBucket: "oracle-station-a187f.firebasestorage.app",
            messagingSenderId: "819786930760",
            appId: "1:819786930760:web:db16c7486a9d65b6d8567d",
            measurementId: "G-3Y59W94T24"
        };
        firebase.initializeApp(firebaseConfig);
        window.firebaseDb = firebase.firestore();
        window.firebaseAuth = firebase.auth();

        // 橋接函數 (給 script.js 用)
        window.collection = (db, name) => db.collection(name);
        window.addDoc = (col, data) => col.add(data);
        window.query = (col, ...args) => {
            let q = col;
            if(args.length > 0 && args[0].type === 'where') q = q.where(args[0].field, args[0].op, args[0].val);
            return q;
        };
        window.where = (field, op, val) => ({type: 'where', field, op, val});
        window.getDocs = (q) => q.get();
        window.signInWithPopup = (auth, provider) => auth.signInWithPopup(provider);
        window.signOut = (auth) => auth.signOut();
        window.GoogleAuthProvider = firebase.auth.GoogleAuthProvider;

        window.onAuthStateChanged = (auth, cb) => auth.onAuthStateChanged(cb);
    </script>

    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
